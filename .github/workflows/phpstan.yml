name: Analyse with PHPStan

on:

  push:
    paths:
      - src/**
      - tests/**
      - composer.json
      - .github/workflows/phpstan.yml

  pull_request:
    paths:
      - src/**
      - tests/**
      - composer.json
      - .github/workflows/phpstan.yml

jobs:

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.4, 8.5]
    steps:

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --level=max --error-format=github src tests
